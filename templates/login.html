<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 도미노 재고·발주</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #e31837;
      --accent-hover: #c41430;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; line-height: 1.5; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 400px; width: 100%; padding: 2rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem 0; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; color: var(--muted); }
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .btn {
      width: 100%;
      padding: 0.7rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>로그인</h1>
      <p class="subtitle">DEPLOYMENT_PASSWORD를 입력하세요.</p>
      <form method="post" action="{{ url_for('login_page') }}">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호 입력" required autofocus>
        <button type="submit" class="btn">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>
